version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: predprof-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    restart: unless-stopped

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: predprof-backend
    ports:
      - "5000:5000"
    environment:
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-admin}
      - DB_NAME=${DB_NAME:-predprof}
      - DB_HOST=mongodb
      - DB_PORT=27017
      - PORT=5000
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: predprof-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodata:
